<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GoLevel — Iniciar Login</title>
    <script src="https://res.cdn.office.net/teams-js/2.28.0/js/MicrosoftTeams.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #1B2A4A;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { text-align: center; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecionando para a Microsoft...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('redirect');

        microsoftTeams.app.initialize().then(() => {
            if (redirectUrl) {
                window.location.assign(redirectUrl);
            } else {
                document.querySelector('p').textContent = 'Erro: URL de redirecionamento não fornecida.';
            }
        }).catch(() => {
            // Fallback caso não esteja no Teams
            if (redirectUrl) {
                window.location.assign(redirectUrl);
            }
        });
    </script>
</body>
</html>
