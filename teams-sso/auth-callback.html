<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>GoLevel — Login Callback</title>
    <script src="https://res.cdn.office.net/teams-js/2.28.0/js/MicrosoftTeams.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #1B2A4A;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <p id="status">Finalizando login...</p>
    </div>

    <script>
        /**
         * Esta página é carregada dentro do popup de autenticação do Teams.
         * 
         * Fluxo:
         * 1. Supabase OAuth redireciona para cá após login na Microsoft
         * 2. A URL contém os tokens no hash (#access_token=...&refresh_token=...)
         * 3. Extraímos os tokens e notificamos o Teams SDK
         * 4. O popup fecha automaticamente
         */

        async function handleCallback() {
            try {
                // Extrair tokens do hash da URL
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);

                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');

                if (accessToken && refreshToken) {
                    const tokens = JSON.stringify({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });

                    // Tentar notificar o Teams SDK (estamos no popup)
                    try {
                        await microsoftTeams.app.initialize();
                        microsoftTeams.authentication.notifySuccess(tokens);
                    } catch (teamsErr) {
                        // Se não está no Teams, pode ser acesso direto — redirecionar
                        console.log('Não é popup do Teams, redirecionando...');
                        window.location.href = 'https://admin.golevel.com.br';
                    }
                } else {
                    // Verificar se há erro
                    const error = params.get('error') || new URLSearchParams(window.location.search).get('error');
                    const errorDesc = params.get('error_description') || 'Login cancelado ou erro desconhecido';

                    document.getElementById('status').textContent = 'Erro: ' + errorDesc;

                    try {
                        await microsoftTeams.app.initialize();
                        microsoftTeams.authentication.notifyFailure(errorDesc);
                    } catch (e) {
                        console.error('Falha ao notificar Teams:', e);
                    }
                }
            } catch (err) {
                document.getElementById('status').textContent = 'Erro inesperado: ' + err.message;
                console.error('Callback error:', err);
            }
        }

        handleCallback();
    </script>
</body>

</html>
